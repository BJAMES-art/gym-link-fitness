<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym-Link Fitness</title>
    <link rel="stylesheet" href="tutostyle.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <h2 class="logo">GYM-LINK <br /><span>Fitness</span></h2>
        <div class="ticker-wrapper">
          <svg viewBox="0 0 1000 120" class="ticker-svg">
            <path
              id="ticker-path"
              d="
        M 120 60
        Q 120 20 160 20
        L 840 20
        Q 880 20 880 60
        Q 880 100 840 100
        L 160 100
        Q 120 100 120 60
      "
              fill="none"
              stroke="rgba(249,178,51,0.2)"
            />

            <text class="ticker-text">
              <textPath id="text1" href="#ticker-path">
                NO PAIN NO GAIN • PUSH YOUR LIMITS • TRAIN HARD • EARN YOUR
                RESULTS • STRENGTH START HERE • LIFT GROW REPEAT • DISCIPLINE
                BUILDS CHAMPIONS • NEVER QUIT • GO •
              </textPath>
            </text>

            <text class="ticker-text">
              <textPath id="text2" href="#ticker-path">
                NO PAIN NO GAIN • PUSH YOUR LIMITS • TRAIN HARD • EARN YOUR
                RESULTS • STRENGTH START HERE • LIFT GROW REPEAT • DISCIPLINE
                BUILDS CHAMPIONS • NEVER QUIT • GO •
              </textPath>
            </text>
          </svg>
        </div>
        <div class="nav-right">
          <a href="index.html" class="nav-link">
            <i class="fa-solid fa-house-chimney"></i>
            <span data-key="trnavlink"></span
          ></a>
          <div class="menu-burger">
            <i class="fas fa-bars" id="menu-btn"></i>
          </div>
        </div>
      </nav>

      <!-- SIDEBAR -->
      <div class="sidebar" id="sidebar">
        <div class="close-btn" id="close-btn">&times;</div>

        <ul>
          <li>
            <a href="nosservices.html" data-key="tr-Services"></a>
          </li>
          <li><a href="tarifs.html" data-key="tr-Tarifs"></a></li>
          <li><a href="contact.html" data-key="tr-cont"></a></li>
          <li class="active">
            <a href="tutoriels.html" data-key="tr-entr&cons">
              <span>→</span>
            </a>
          </li>
        </ul>

        <div class="bottom">
          <a href="serviceclient.html">
            <span data-key="service_client"></span>
            <i class="fas fa-info-circle"></i>
          </a>

          <div id="google_translate_element">
            <div class="langue">
              <p onclick="toggleMenu()">
                <span id="current-lang">Français</span>
                <i class="fas fa-chevron-down"></i>
              </p>

              <ul id="lang-menu" class="hidden">
                <li onclick="changeLang('fr')">Français</li>
                <li onclick="changeLang('en')">English</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </header>
    <section class="hero">
      <div class="middle-images">
        <img
          src="IMAGE/pexels-freestockpro-2837005.jpg"
          alt="Recette saine"
          class="img-card img1"
        />
        <img
          src="IMAGE/pexels-nerosable-35787348.jpg"
          alt="Exercice physique"
          class="img-card img2"
        />
      </div>
      <marquee class="hero-ticker" scrollamount="6">
        EAT HEALTHY , LIVE BETTER • EAT CLEAN , STAY STRONG • TRAIN HARD ,
        NOURRISH YOUR BODY • DISCIPLINE BUILDS CHAMPIONS , EVERY BITE COUNT •
        NEVER QUIT • GO FOR IT •
      </marquee>
    </section>

  <script src="translate.js"></script>
</html>
